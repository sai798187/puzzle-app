apiVersion: apps/v1
kind: Deployment
metadata:
  name: puzzle-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: puzzle
  template:
    metadata:
      labels:
        app: puzzle
    spec:
      containers:
      - name: puzzle-container
        image: rogan07sg/puzzle-app:latest
        ports:
        - containerPort: 5000
