<!DOCTYPE html>
<html>
<head>
    <title>Puzzle Game</title>
    <style>
        body { text-align: center; font-family: Arial; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }
        .tile {
            width: 100px;
            height: 100px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .empty {
            background: #ccc;
        }
    </style>
</head>
<body>

<h1>🧩 Puzzle Game</h1>
<p>Arrange numbers in order!</p>

<div class="grid" id="grid"></div>

<script>
let tiles = [1,2,3,4,5,6,7,8,""];

function shuffle() {
    tiles.sort(() => Math.random() - 0.5);
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    tiles.forEach((tile, index) => {
        const btn = document.createElement("button");
        btn.className = "tile";
        if(tile === "") btn.classList.add("empty");
        btn.innerText = tile;
        btn.onclick = () => move(index);
        grid.appendChild(btn);
    });
}

function move(index) {
    const emptyIndex = tiles.indexOf("");
    const validMoves = [
        emptyIndex - 1,
        emptyIndex + 1,
        emptyIndex - 3,
        emptyIndex + 3
    ];
    if(validMoves.includes(index)) {
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        render();
    }
}

shuffle();
render();
</script>

</body>
</html>
